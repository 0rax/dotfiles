# Define names for workspaces
set $ws1  "1:Home"
set $ws2  "2:Code"
set $ws3  "3:Web"
set $ws4  "4:Files"
set $ws5  "5:Media"
set $ws6  "6:Chat"
set $ws7  "7:3D"
set $ws8  "8:VM"
set $ws9  "9"
set $ws10 "10"

# assign workspace to monitor
workspace $ws1 output DP-6
workspace $ws2 output DP-6
workspace $ws3 output DP-6
workspace $ws4 output DP-6
workspace $ws5 output DP-6
workspace $ws6 output DP-5

# assign program to workspace
assign [class="^Code$"]         ÔåÆ $ws2
assign [class="^VSCodium$"]     ÔåÆ $ws2
assign [app_id="^codium"]       ÔåÆ $ws2
assign [class="^firefox"]       ÔåÆ $ws3
assign [app_id="^firefox"]      ÔåÆ $ws3
assign [class="^LibreWolf$"]    ÔåÆ $ws3
assign [app_id="^LibreWolf$"]   ÔåÆ $ws3
assign [class="^vlc$"]          ÔåÆ $ws5
assign [class="^obsidian$"]     ÔåÆ $ws4
assign [app_id="^obsidian$"]    ÔåÆ $ws4
assign [class="^Ferdium$"]      ÔåÆ $ws6
assign [app_id="^ferdium$"]     ÔåÆ $ws6
assign [app_id="^Beeper$"]      ÔåÆ $ws6

